# --- BENCHMARK EXTENSION — Day 5, q041–q070 ---
#
# Added 2026-06-18 (Day 5) to strengthen the cross-document N=2
# limitation flagged in docs/evaluation.md and to give the adjacent-
# refusal category more sample size. Brings the benchmark from 40 → 70
# questions: 44 answerable + 26 refusal.
#
# Composition of the +30:
#   +8  cross_document (was 2, now 10)
#   +6  multi_chunk_*  (was 6, now 12)
#   +6  refusal_adjacent (was 4, now 10)
#   +4  single_chunk_* (was 18, now 22)
#   +4  refusal_out_of_corpus (was 6, now 10)
#   +2  refusal_false_premise (was 4, now 6)
#
# Gold_chunk_ids on cross-doc and multi-chunk questions use chunk IDs
# observed in actual retrieval outputs during Days 3–4. The runner's
# validate_benchmark_against_corpus pre-flight will fail-fast if any
# is stale.


