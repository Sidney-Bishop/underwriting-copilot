# Cedant Day 3 Eval Benchmark
# ============================
#
# 40 questions per D014. Distribution:
#   - 26 answerable
#       - 7 PRA SS5/25 (climate, current)
#       - 5 EIOPA Governance Guidelines
#       - 5 Munich Re Sustainability Report 2023
#       - 5 Swiss Re Sustainability Report 2024
#       - 2 PRA SS1/21 (operational resilience)
#       - 2 cross-document synthesis
#   - 14 should-refuse
#       - 6 clearly out-of-corpus topics
#       - 4 adjacent-but-unanswered (corpus mentions but lacks specific detail)
#       - 4 false-premise (assumes a fact not in the corpus)
#
# Field reference:
#   id                  : stable identifier qNNN
#   query               : the natural-language question
#   expected_refusal    : true if the system should emit the refusal phrase
#   gold_chunk_ids      : chunks that should appear in citations (empty for refusals)
#   category            : groups questions for per-category reporting
#   notes               : optional, used when the question's purpose is subtle
#
# All chunk_ids in gold_chunk_ids reconciled against scratch/qdrant
# (461 chunks dumped via scripts/probes/dump_chunks.py). Hand-authored by
# Claude after reading the chunk_index TSV; validation that gold_chunk_ids
# actually exist in the index is part of the scorer's startup check.


